apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skillbridge-server-hpa
  namespace: skillbridge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skillbridge-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # Scale on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # Scale up when avg CPU > 60%
    # Scale on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75   # Scale up when avg memory > 75%
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30    # Scale up quickly under load
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
